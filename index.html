<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Falls</title>
    <style>
        /* Reset margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ensure the body takes up the full screen height */
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header styling */
        header {
            width: 100%;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7); /* Transparent black background */
            text-align: center;
            position: relative;
            z-index: 1000;
        }

        header h1 {
            font-size: 2em;
            color: #fff;
        }

        header a {
            color: #1e90ff;
            text-decoration: none;
            font-size: 1.2em;
            margin-left: 20px;
        }

        header a:hover {
            text-decoration: underline;
        }

        /* Main content area where background image will be applied */
        .content {
            flex: 1;  /* Take up the remaining vertical space between header and footer */
            background: url('background-image.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Footer styling */
        footer {
            width: 100%;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.7); /* Transparent black background */
            color: white;
            text-align: center;
            position: relative;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Colour Falls</h1>
        <a href="privacypolicy.html">Privacy Policy</a>
    </header>

    <!-- Main Content Area (with background image) -->
    <div class="content">
        <!-- Your game logo or any other content can go here -->
    </div>

    <!-- Footer Section -->
    <footer>
        &copy; 2024 Colour Falls. All rights reserved.
    </footer>

</body>
</html>
