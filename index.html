<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Falls</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Reset margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ensure body takes full height */
        body, html {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header styles */
        header {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
        }

        .navbar {
            padding: 0.8rem 2rem;
        }

        .navbar-brand {
            font-size: 2.2em;
            font-weight: bold;
            color: #fff;
        }

        .navbar-brand:hover {
            color: #f8f9fa;
        }

        .nav-link {
            color: #fff !important;
            font-size: 1.1em;
            margin-right: 20px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        /* Main Content Area with background image */
        .content {
            flex: 1;
            background: url('background-image.png') no-repeat center center; /* Center and no-repeat */
            background-size: cover; /* Cover ensures the image fills the area */
            position: relative; /* Position relative for the overlay */
        }

        /* Add overlay for the text inside the body */
        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            color: white;
            text-align: center;
            position: absolute; /* Absolute to fill the content area */
            top: 0; /* Position at the top */
            left: 0; /* Position at the left */
            right: 0; /* Position at the right */
            bottom: 0; /* Position at the bottom */
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            flex-direction: column; /* Stack items vertically */
        }

        .overlay h2 {
            font-size: 2.2em;
        }

        /* Footer styles */
        footer {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            text-align: center;
        }

        /* Responsive font sizes */
        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1.8em;
            }

            .overlay h2 {
                font-size: 1.8em;
            }
        }

        @media (max-width: 576px) {
            .navbar-brand {
                font-size: 1.6em;
            }

            .overlay h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section with Navbar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Colour Falls</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="privacypolicy.html">Privacy Policy</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content Area -->
    <div class="content">
        <!-- Overlay for displaying the main message/logo over the background -->
        <div class="overlay">
            <h2>Catch the Colours, Beat the Score!</h2>
            <p>Challenge your friends, and climb the leaderboard in Colour Falls.</p>
            <!-- Call-to-action button -->
            <a href="#" class="btn btn-primary btn-lg">Download Now</a>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        &copy; 2024 Colour Falls. All rights reserved.
    </footer>

    <!-- Bootstrap JS (for navbar toggling and other features) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
