<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Falls</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Reset margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ensure body takes full height */
        body, html {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Gradient Header styles */
        header {
            background: linear-gradient(90deg, #6a00f4, #2f80ed); /* Purple-blue gradient */
            padding: 15px 0;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .navbar-brand {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .navbar-brand:hover {
            color: #ffe9c4;
        }

        .nav-link {
            color: #fff !important;
            font-size: 1.1em;
            margin-right: 20px;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #ffe9c4;
        }

        /* Main Content Area */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #000;
            padding: 40px 0;
        }

        .content img {
            width: 100%;
            height: auto;
            object-fit: contain;
            max-height: 100%;
        }

        /* Responsive overlay content for text/logo over the image */
        .overlay {
            position: absolute;
            z-index: 2;
            color: white;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            max-width: 80%;
            width: 50%; /* Default width */
            transition: width 0.3s ease;
        }

        .overlay h2 {
            font-size: 2.2em;
        }

        .overlay p {
            font-size: 1.2em;
            margin-top: 10px;
        }

        /* Responsive sizing for download button and overlay */
        @media (max-width: 768px) {
            .overlay {
                width: 80%; /* Increase size on smaller screens */
            }

            .overlay h2 {
                font-size: 1.8em;
            }

            .overlay p {
                font-size: 1.1em;
            }
        }

        /* Footer styles */
        footer {
            background: linear-gradient(90deg, #6a00f4, #2f80ed);
            color: white;
            padding: 15px;
            text-align: center;
        }

        footer p {
            margin: 0;
            font-size: 1.1em;
        }

        footer a {
            color: #ffe9c4;
            text-decoration: none;
            font-weight: bold;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Screenshots section */
        .screenshots {
            padding: 50px 0;
            background-color: #f5f5f5;
            text-align: center;
        }

        .screenshots h3 {
            font-size: 2em;
            margin-bottom: 30px;
        }

        .screenshots .row img {
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Contact form styles */
        .contact-form {
            padding: 40px 0;
            background-color: #2f80ed;
            color: white;
            text-align: center;
        }

        .contact-form h3 {
            margin-bottom: 30px;
        }

        .contact-form input, .contact-form textarea {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            border: none;
            width: 100%;
        }

        .contact-form button {
            padding: 10px 30px;
            border-radius: 8px;
            background-color: #6a00f4;
            color: white;
            border: none;
            font-size: 1.1em;
        }

        @media (min-width: 992px) {
            .screenshots .row > div {
                flex: 0 0 32%; /* 3 images in the top row */
            }

            .screenshots .row:last-child > div {
                flex: 0 0 49%; /* 2 images in the second row */
            }
        }
    </style>
</head>
<body>

    <!-- Header Section with Navbar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Colour Falls</a>
            </div>
        </nav>
    </header>

    <!-- Main Content Area -->
    <div class="content">
        <!-- Image added inside the content section -->
        <img src="background-image.png" alt="Game Image">

        <!-- Overlay content for text/logo over the image -->
        <div class="overlay">
            <h2>Catch the Colours, Beat the Score!</h2>
            <p>Challenge your friends, and climb the leaderboard in Colour Falls.</p>
            <a href="#" class="btn btn-primary btn-lg">Download Now</a>
        </div>
    </div>

    <!-- Game Description Section -->
    <section class="screenshots">
        <h3>Game Screenshots</h3>
        <div class="container">
            <div class="row">
                <div class="col-md-4"><img src="screenshot1.png" alt="Screenshot 1"></div>
                <div class="col-md-4"><img src="screenshot2.png" alt="Screenshot 2"></div>
                <div class="col-md-4"><img src="screenshot3.png" alt="Screenshot 3"></div>
            </div>
            <div class="row">
                <div class="col-md-6"><img src="screenshot4.png" alt="Screenshot 4"></div>
                <div class="col-md-6"><img src="screenshot5.png" alt="Screenshot 5"></div>
            </div>
        </div>
    </section>

    <!-- Contact Form Section -->
    <section class="contact-form">
        <h3>Contact Us</h3>
        <form action="#" method="POST">
            <div class="container">
                <div class="row">
                    <div class="col-md-6">
                        <input type="text" name="name" placeholder="Your Name" required>
                    </div>
                    <div class="col-md-6">
                        <input type="email" name="email" placeholder="Your Email" required>
                    </div>
                </div>
                <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </div>
        </form>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2024 Colour Falls. All rights reserved. | <a href="privacypolicy.html">Privacy Policy</a></p>
    </footer>

    <!-- Bootstrap JS (for navbar toggling and other features) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
