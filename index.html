<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Falls</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Custom Styles */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        /* Header */
        header {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
        }

        header a {
            color: #1e90ff;
            text-decoration: none;
            font-size: 1.2em;
            margin-left: 20px;
        }

        header a:hover {
            text-decoration: underline;
        }

        /* Main Content */
        .content {
            background: url('background-image.png') no-repeat center center;
            background-size: cover;
            height: calc(100vh - 120px); /* Subtract header and footer height */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Add some overlay for content visibility over the background */
        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            color: white;
            text-align: center;
        }

        .overlay h2 {
            font-size: 2.2em;
        }

        /* Footer */
        footer {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            text-align: center;
            position: relative;
            z-index: 1000;
        }

        /* Ensure proper responsive font sizes */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .overlay h2 {
                font-size: 1.8em;
            }
        }

        @media (max-width: 576px) {
            header h1 {
                font-size: 1.8em;
            }

            .overlay h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Colour Falls</h1>
        <a href="privacypolicy.html">Privacy Policy</a>
    </header>

    <!-- Main Content Area -->
    <div class="content">
        <!-- Overlay for displaying the main message/logo over the background -->
        <div class="overlay">
            <h2>Catch the Colours, Beat the Score!</h2>
            <p>Challenge your friends, and climb the leaderboard in Colour Falls.</p>
            <!-- Call-to-action button -->
            <a href="#" class="btn btn-primary btn-lg">Download Now</a>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        &copy; 2024 Colour Falls. All rights reserved.
    </footer>

    <!-- Bootstrap JS (optional, for interactive features) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
