<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Falls</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Reset margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ensure body takes full height */
        body, html {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header styles */
        header {
            background: linear-gradient(90deg, #ff5f6d, #ffc371); /* Gradient background */
            padding: 10px 0;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        }

        .navbar {
            padding: 0.8rem 2rem;
        }

        .navbar-brand {
            font-size: 2.2em;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px; /* Spacing for a modern look */
        }

        .navbar-brand:hover {
            color: #ffe9c4;
        }

        .nav-link {
            color: #fff !important;
            font-size: 1.1em;
            font-weight: 500;
            margin-right: 20px;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #ffe9c4;
        }

        /* Add bottom underline on hover */
        .nav-link::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background-color: #fff;
            position: absolute;
            bottom: -5px;
            left: 0;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Main Content Area styling */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #000;
        }

        .content img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* Overlay content for text/logo over the image */
        .overlay {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
        }

        .overlay h2 {
            font-size: 2.2em;
        }

        /* Footer styles */
        footer {
            background: linear-gradient(90deg, #ff5f6d, #ffc371);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0px -4px 10px rgba(0, 0, 0, 0.1); /* Shadow on top */
        }

        footer p {
            margin: 0;
            font-size: 1.1em;
        }

        footer a {
            color: #ffe9c4;
            text-decoration: none;
            font-weight: bold;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive font sizes */
        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1.8em;
            }

            .overlay h2 {
                font-size: 1.8em;
            }
        }

        @media (max-width: 576px) {
            .navbar-brand {
                font-size: 1.6em;
            }

            .overlay h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section with Navbar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Colour Falls</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="privacypolicy.html">Privacy Policy</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content Area -->
    <div class="content">
        <!-- Image added inside the content section -->
        <img src="background-image.png" alt="Game Image">

        <!-- Overlay content for text/logo over the image -->
        <div class="overlay">
            <h2>Catch the Colours, Beat the Score!</h2>
            <p>Challenge your friends, and climb the leaderboard in Colour Falls.</p>
            <!-- Call-to-action button -->
            <a href="#" class="btn btn-primary btn-lg">Download Now</a>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2024 Colour Falls. All rights reserved. | <a href="privacypolicy.html">Privacy Policy</a></p>
    </footer>

    <!-- Bootstrap JS (for navbar toggling and other features) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
