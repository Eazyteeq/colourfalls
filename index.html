<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Falls</title>
    <style>
        /* Reset browser default margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Set the background image to cover the entire page */
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            background: url('background-image.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #fff;
        }

        /* Header styling */
        header {
            width: 100%;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7); /* Slightly transparent black background */
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 2em;
            color: #fff;
        }

        header a {
            color: #1e90ff;
            text-decoration: none;
            font-size: 1.2em;
            margin-left: 20px;
        }

        header a:hover {
            text-decoration: underline;
        }

        /* Footer to make sure there's space for scroll or extra content */
        footer {
            text-align: center;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Colour Falls</h1>
        <a href="privacy-policy.html">Privacy Policy</a>
    </header>

    <!-- Main content (this will be your full-screen background) -->
    <!-- If you want to add more content, place it here -->
    
    <!-- Optional Footer if needed -->
    <footer>
        &copy; 2024 Colour Falls. All rights reserved.
    </footer>

</body>
</html>
