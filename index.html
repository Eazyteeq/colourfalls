<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Falls</title>
    <style>
        /* Reset margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ensure the entire body is flexbox container */
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Ensures content stays between header and footer */
            background-color: #000; /* Fallback color */
        }

        /* Header Styling */
        header {
            width: 100%;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7); /* Slightly transparent black background */
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 2em;
            color: #fff;
        }

        header a {
            color: #1e90ff;
            text-decoration: none;
            font-size: 1.2em;
            margin-left: 20px;
        }

        header a:hover {
            text-decoration: underline;
        }

        /* Main content area where background image will be applied */
        .content {
            flex: 1;
            background: url('background-image.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Footer Styling */
        footer {
            text-align: center;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.7); /* Footer background */
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Colour Falls</h1>
        <a href="privacypolicy.html">Privacy Policy</a>
    </header>

    <!-- Main Content Area for background image -->
    <div class="content">
        <!-- Optional content here -->
    </div>

    <!-- Footer Section -->
    <footer>
        &copy; 2024 Colour Falls. All rights reserved.
    </footer>

</body>
</html>
